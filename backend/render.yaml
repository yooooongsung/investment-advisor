services:
  - type: web
    name: investment-advisor-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABRICKS_SERVER_HOSTNAME
        sync: false
      - key: DATABRICKS_HTTP_PATH
        sync: false
      - key: DATABRICKS_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
